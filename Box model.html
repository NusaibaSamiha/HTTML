<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            background-color: darkgreen;
            font-family: Arial, sans-serif;
        }

        .fact-file {
            background-color: lightyellow;
            color: darkslategray;
            width: 260px;
            padding: 25px;
            border: 4px solid forestgreen;
            margin: 30px;
        }

        .animal-name {
            color: forestgreen;
            font-size: 22px;
        }

        .detail {
            color: darkslategray;
        }

        .cool-fact {
            color: darkorange;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="fact-file">
        <h2 class="animal-name">Snow Leopard</h2>
        <p class="detail">Type: Big Cat</p>
        <p class="detail">Lives in: Mountain ranges of Central Asia</p>
        <p class="Diet: Deer, goats and wild sheep"></p>
        <p class="cool-fact">Cool Fact: Can leap up to 15 metres in one jump!</p>
    </div>
</body>

</html>
