<!DOCTYPE html>
<html>
    <body>

        <h2>Statement</h2>

        <p>A <b>JavaScript program</b> is a sequence of statements that are executed by the JavaScript engine.</p>

        <p id="demo"></p>

        <script>
            var x, y, z; // Statement 1
            x = 5; // Statement 2
            y = 6; // Statement 3
            z = x + y; // Statement 4

            document.getElemnetbyId("demo").innerHTML ="The value of z is: " + z; // Statement 5
        </script>
    </body>
</html>
