<!DOCTYPE html>
<html>

<head>
    <title>My Magic Word Lab</title>
    <link rel="stylehseet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4,3,1/css/bootstrap.mn.css">
    <style>
        body {
            background: lightyellow;
        }

        h1,
        h3 {
            color: darkorange;
        }

        .box {
            background: white;
            color: darkorange;
        }
    </style>
</head>

<body>
    <div class="container py-4">
        <h1 class="mb-1">My Magic Word Lab</h1>
        <p class="text-muted mb-4">Discover types, switch them, find and swap words and catch sneaky errors!</p>

        <div class="card mb-4">
            <div class="card-body" </div>
                <h3 class="card-title>What Type Is It?" </h3>
                    <button class="btn btn-warning" onclick="checkTypes()">Reveal the Types!</button>
                    <div id="typeResult" class="box p-3 mt-3 rounded">Press the button!</div>
            </div>
            <div class="card mb-4">
                <div class="card-body">
                    <h3 class="card-title">Switch the Type</h3>
                    <input id="numIn" class="form-control mb-2" placeholder="Type any number here">
                    <button class="btn btn-warning mr-2" onclick="toStr()">Turn into Text</button>
                    <button class="btn btn-warning" onclick="toNum()">Turn into Number</button>
                    <div id="convResult" class="box p-3 mt-3 rounded">Type a number above then press a button!</div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-body">
                    <h3 class="card-title">Find and swap a work</h3>
                    <input id="findW" class="form-control mb-2" placeholder="Word to find (try:dragon)">
                    <input id="swapW" class="form-control mb-2" placeholder="Swap it with(try:wizard)">
                    <button class="btn btn-warning mr-2" onclick="doSearch()">Find It!</button>
                </div>
</body>

</html>
