<!DOCTYPE html>

<head>
    <title>My Food Menu</title>
    <style>
        body {
            font-family: Arial;
            background: blue;
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: crimson
        }

        h1+p {
            background: yellowgreen;
            padding: 10px 20px;
            border: radius: 8px;
            color: blue;
            display: inline-block;
        }

        ul {
            padding: 0;
            margin-top: 20px;
        }

        ul>li {
            list-style: none;
            font-size: 18px;
            font-weight: bold;
            color: orange;
            padding: 10px 20px;
            margin: 6px auto;
            width: 260px;
            background: blue;
            border-radius: 8px;
        }

        ul li:nth child(3) {
            background: blue;
            color: orange;
        }
    </style>
</head>

<body>
    <h1>My Food Menu</h1>
    <p>Pick your favourite dish and dig in!</p>

    <ul>
        <li>Pizza</li>
        <li>Burger</li>
        <li>Tacos-CHef's Special</li>
        <li>Noodles</li>
        <li>Ice Cream</li>
    </ul>

    <p class="desc">Every dish on this menu is made with love and lots of flavour. Try them all and find your favourite!
    </p>

    <div class="links" <a href="#">Order Now</a>
        <a href="#">See More</a>
    </div>
</body>

</html>
